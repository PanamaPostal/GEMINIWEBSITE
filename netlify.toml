# Netlify build config for the PPS Panama Postal landing page.
# The actual Vite project lives under pps-logistics/.

[build]
  base    = "pps-logistics"
  command = "npm run build"
  publish = "dist"                 # relative to base, so => pps-logistics/dist

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — any unknown path serves index.html so React routing (if added
# later) doesn't 404. Harmless for the current static landing.
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# Security + performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Cache hashed assets aggressively (Vite emits immutable file names).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
